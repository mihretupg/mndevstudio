<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Lakun Landing Page Preview</title>
  <desc id="desc">A simple landing page preview for Lakun, a hyperlocal apartment delivery platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071311"/>
      <stop offset="0.52" stop-color="#113f35"/>
      <stop offset="1" stop-color="#c7f35f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ccff00"/>
      <stop offset="1" stop-color="#7ddf64"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <path d="M0 760c214-110 428-158 641-145 288 17 560-12 959-211v596H0V760Z" fill="#ffffff" fill-opacity="0.08"/>
  <g transform="translate(128 108)">
    <rect width="1344" height="784" rx="42" fill="#071311" fill-opacity="0.64" stroke="#ccff00" stroke-opacity="0.2"/>
    <g transform="translate(58 46)">
      <rect width="132" height="54" rx="14" fill="#ffffff"/>
      <text x="66" y="36" text-anchor="middle" fill="#113f35" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="800">Lakun</text>
      <text x="800" y="35" fill="#dbe8df" fill-opacity="0.72" font-family="Poppins, Arial, sans-serif" font-size="22">Shops</text>
      <text x="900" y="35" fill="#dbe8df" fill-opacity="0.72" font-family="Poppins, Arial, sans-serif" font-size="22">Orders</text>
      <text x="1015" y="35" fill="#dbe8df" fill-opacity="0.72" font-family="Poppins, Arial, sans-serif" font-size="22">Delivery</text>
      <rect x="1150" y="0" width="128" height="48" rx="24" fill="url(#accent)"/>
      <text x="1214" y="31" text-anchor="middle" fill="#071311" font-family="Poppins, Arial, sans-serif" font-size="18" font-weight="800">Order</text>
    </g>
    <g transform="translate(70 205)">
      <text fill="#ffffff" font-family="Poppins, Arial, sans-serif" font-size="78" font-weight="800">Apartment delivery,</text>
      <text y="92" fill="#ccff00" font-family="Poppins, Arial, sans-serif" font-size="78" font-weight="800">priced by nearby shops.</text>
      <text y="166" fill="#dbe8df" fill-opacity="0.78" font-family="Poppins, Arial, sans-serif" font-size="30">Residents request items, vendors bid, and fulfillment stays organized from approval to handoff.</text>
      <rect y="246" width="238" height="68" rx="34" fill="url(#accent)"/>
      <text x="119" y="290" text-anchor="middle" fill="#071311" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="800">Start Order</text>
    </g>
    <g transform="translate(920 190)" filter="url(#shadow)">
      <rect width="330" height="520" rx="40" fill="#f9fff8"/>
      <rect x="28" y="34" width="274" height="72" rx="22" fill="#ecf7e9"/>
      <text x="54" y="79" fill="#113f35" font-family="Poppins, Arial, sans-serif" font-size="24" font-weight="800">Today's bids</text>
      <g transform="translate(28 136)">
        <rect width="274" height="92" rx="22" fill="#ffffff" stroke="#d7ecd2"/>
        <circle cx="45" cy="46" r="24" fill="#ccff00"/>
        <text x="84" y="42" fill="#113f35" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">Fresh Mart</text>
        <text x="84" y="68" fill="#769083" font-family="Poppins, Arial, sans-serif" font-size="16">ETB 680 total</text>
      </g>
      <g transform="translate(28 252)">
        <rect width="274" height="92" rx="22" fill="#ffffff" stroke="#d7ecd2"/>
        <circle cx="45" cy="46" r="24" fill="#7ddf64"/>
        <text x="84" y="42" fill="#113f35" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">Corner Shop</text>
        <text x="84" y="68" fill="#769083" font-family="Poppins, Arial, sans-serif" font-size="16">ETB 705 total</text>
      </g>
      <rect x="28" y="402" width="274" height="66" rx="28" fill="#113f35"/>
      <text x="165" y="443" text-anchor="middle" fill="#ccff00" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">Assign Delivery</text>
    </g>
  </g>
</svg>
