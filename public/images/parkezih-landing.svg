<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ParkEzih Landing Page Preview</title>
  <desc id="desc">A simple landing page preview for ParkEzih, a parking space finder app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.54" stop-color="#e8f2ff"/>
      <stop offset="1" stop-color="#fff0df"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#075aba"/>
      <stop offset="1" stop-color="#1b78df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#075aba" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <path d="M0 720c236 82 462 107 678 77 286-39 560-8 922 120v83H0V720Z" fill="#075aba" fill-opacity="0.08"/>
  <g transform="translate(128 108)">
    <rect width="1344" height="784" rx="42" fill="#ffffff" stroke="#d6e5f7"/>
    <g transform="translate(58 44)">
      <g>
        <path d="M0 26C0 11.641 11.641 0 26 0C40.359 0 52 11.641 52 26C52 40.359 40.359 52 26 52H0V26Z" fill="#075aba"/>
        <circle cx="26" cy="26" r="12" fill="#ffffff"/>
        <rect y="62" width="52" height="52" fill="#f2994a"/>
      </g>
      <text x="76" y="44" fill="#075aba" font-family="Poppins, Arial, sans-serif" font-size="31" font-weight="800">Park</text>
      <text x="154" y="44" fill="#f2994a" font-family="Poppins, Arial, sans-serif" font-size="31" font-weight="800">Ezih</text>
      <text x="820" y="38" fill="#40566d" font-family="Poppins, Arial, sans-serif" font-size="21">Find Parking</text>
      <text x="980" y="38" fill="#40566d" font-family="Poppins, Arial, sans-serif" font-size="21">Map</text>
      <rect x="1110" y="0" width="166" height="52" rx="26" fill="#f2994a"/>
      <text x="1193" y="34" text-anchor="middle" fill="#13283d" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="800">Open App</text>
    </g>
    <g transform="translate(70 240)">
      <text fill="#13283d" font-family="Poppins, Arial, sans-serif" font-size="80" font-weight="800">Find a parking spot</text>
      <text y="92" fill="#075aba" font-family="Poppins, Arial, sans-serif" font-size="80" font-weight="800">before you arrive.</text>
      <text y="168" fill="#526a82" font-family="Poppins, Arial, sans-serif" font-size="30">Search nearby parking, compare available spaces, and head straight to the easiest option.</text>
      <rect y="250" width="250" height="70" rx="35" fill="url(#blue)"/>
      <text x="125" y="295" text-anchor="middle" fill="#ffffff" font-family="Poppins, Arial, sans-serif" font-size="23" font-weight="800">Find Parking</text>
    </g>
    <g transform="translate(920 178)" filter="url(#shadow)">
      <rect width="330" height="536" rx="42" fill="#f8fbff"/>
      <rect x="26" y="30" width="278" height="86" rx="24" fill="#ffffff" stroke="#dce9f8"/>
      <text x="52" y="66" fill="#13283d" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">Near me</text>
      <text x="52" y="94" fill="#6c7f91" font-family="Poppins, Arial, sans-serif" font-size="16">12 spaces nearby</text>
      <rect x="26" y="138" width="278" height="204" rx="28" fill="#d8eafe"/>
      <path d="M44 285c47-66 90-84 130-54 48 36 73 18 112-50" fill="none" stroke="#075aba" stroke-width="12" stroke-linecap="round"/>
      <circle cx="97" cy="243" r="18" fill="#f2994a"/>
      <circle cx="238" cy="198" r="18" fill="#075aba"/>
      <g transform="translate(26 370)">
        <rect width="278" height="72" rx="22" fill="#ffffff" stroke="#dce9f8"/>
        <text x="28" y="33" fill="#13283d" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">Garage A</text>
        <text x="28" y="58" fill="#6c7f91" font-family="Poppins, Arial, sans-serif" font-size="15">3 min walk</text>
        <text x="206" y="45" fill="#075aba" font-family="Poppins, Arial, sans-serif" font-size="20" font-weight="800">8 spots</text>
      </g>
      <rect x="26" y="466" width="278" height="54" rx="27" fill="#f2994a"/>
      <text x="165" y="501" text-anchor="middle" fill="#13283d" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="800">Navigate</text>
    </g>
