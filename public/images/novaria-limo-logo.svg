<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-labelledby="title desc">
  <title id="title">Novaria Limo logo</title>
  <desc id="desc">Novaria Limo wordmark with a gold N monogram.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6c15a"/>
      <stop offset="1" stop-color="#f5a30f"/>
    </linearGradient>
  </defs>
  <rect width="520" height="220" rx="18" fill="#090909"/>
  <rect x="34" y="42" width="116" height="136" rx="14" fill="url(#gold)"/>
  <text x="66" y="133" fill="#090909" font-family="Georgia, serif" font-size="96" font-weight="700">N</text>
  <text x="185" y="99" fill="#ffffff" font-family="Poppins, Arial, Helvetica, sans-serif" font-size="48" font-weight="800" letter-spacing="5">NOVARIA</text>
  <text x="213" y="154" fill="#f5a30f" font-family="Poppins, Arial, Helvetica, sans-serif" font-size="35" font-weight="700" letter-spacing="18">LIMO</text>
</svg>
